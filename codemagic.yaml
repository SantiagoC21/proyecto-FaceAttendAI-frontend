workflows:
  ios-unsigned:
    name: iOS sin firmar (para Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Obtener dependencias de Flutter
        script: flutter pub get
      - name: Instalar CocoaPods
        script: |
          cd ios && pod install && cd ..
      - name: Compilar app iOS sin firma
        script: |
          flutter build ios --release --no-codesign
      - name: Empaquetar en IPA (sin firmar, para Sideloadly)
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r app-unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/app-unsigned.ipa